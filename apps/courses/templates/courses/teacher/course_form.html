{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Course — EdTech{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'teacher_course_list' %}" class="text-[#8b949e] hover:text-white text-sm">← My Courses</a>
    <span class="text-[#30363d]">/</span>
    <span class="text-white text-sm">{{ action }} Course</span>
  </div>
  <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-6">
    <h1 class="text-2xl font-bold text-white mb-6">{{ action }} Course</h1>
    {% crispy form %}
  </div>
</div>
{% endblock %}
