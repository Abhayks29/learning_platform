{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Lesson — {{ course.title }}{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-2 text-sm mb-6">
    <a href="{% url 'teacher_course_detail' slug=course.slug %}" class="text-[#8b949e] hover:text-white">← {{ course.title }}</a>
    <span class="text-[#30363d]">/</span>
    <span class="text-white">{{ action }} Lesson</span>
  </div>
  <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-6">
    <h1 class="text-2xl font-bold text-white mb-6">{{ action }} Lesson</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% crispy form %}
    </form>
  </div>
</div>
{% endblock %}
