{% extends 'base_auth.html' %}
{% load crispy_forms_tags %}
{% block title %}Sign In — EdTech{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold text-white mb-6 text-center">Sign in to EdTech</h2>
<form method="post" action="{% url 'account_login' %}">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4">
    Sign In
  </button>
</form>
<p class="mt-6 text-center text-sm text-[#8b949e]">
  Don't have an account?
  <a href="{% url 'register' %}" class="text-blue-400 hover:text-blue-300">Sign up</a>
</p>
{% endblock %}
