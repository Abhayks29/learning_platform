{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if assignment %}Edit{% else %}Create{% endif %} Assignment{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
  <a href="{% url 'teacher_assignment_list' course_slug=course.slug %}" class="text-xs text-[#8b949e] hover:text-white mb-4 block">← Assignments</a>
  <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-6">
    <h1 class="text-xl font-bold text-white mb-6">{% if assignment %}Edit{% else %}Create{% endif %} Assignment</h1>
    {% crispy form %}
  </div>
</div>
{% endblock %}
