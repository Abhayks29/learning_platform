<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EdTech Platform{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-6 py-8">
    <div class="text-center mb-8">
      <a href="{% url 'home' %}" class="text-2xl font-bold text-blue-400">
        &lt;EdTech/&gt;
      </a>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
          {% if message.tags == 'error' %}bg-red-900 text-red-200 border border-red-700
          {% elif message.tags == 'success' %}bg-green-900 text-green-200 border border-green-700
          {% else %}bg-blue-900 text-blue-200 border border-blue-700{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-8">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
